name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build release
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v5

      - name: Configure Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: '26.1'

      - name: Configure JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Load secrets
        run: |
          echo "tfl_key=${{ secrets.TFL_KEY }}" > shared/secret.properties
          echo "darwin_key=${{ secrets.DARWIN_KEY }}" >> shared/secret.properties
          echo "org_511_key=${{ secrets.ORG_511_KEY }}" >> shared/secret.properties

      - name: Build
        run: |
          xcodebuild -project macOS/Arrivals.xcodeproj \
            -scheme Arrivals \
            -configuration Release build

      - name: Sign
        env:
          MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
          ARTIFACT_PATH: "macOS/target/Arrivals.app"
        run: |          
          echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12
          
          security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain 
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          
          /usr/bin/codesign --force -s "$MACOS_CERTIFICATE_NAME" --deep --timestamp --options runtime "$ARTIFACT_PATH" -v

      - name: Notarize
        env:
          PROD_MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_APPLE_ID }}
          PROD_MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_TEAM_ID }}
          PROD_MACOS_NOTARIZATION_PWD: ${{ secrets.PROD_MACOS_NOTARIZATION_PWD }}
          ARTIFACT_PATH: "macOS/target/Arrivals.app"
        run: |
          xcrun notarytool store-credentials "notarytool-profile" --apple-id "$PROD_MACOS_NOTARIZATION_APPLE_ID" --team-id "$PROD_MACOS_NOTARIZATION_TEAM_ID" --password "$PROD_MACOS_NOTARIZATION_PWD"

          ditto -c -k --keepParent "$ARTIFACT_PATH" "arrivals-upload.zip"
          
          xcrun notarytool submit "arrivals-upload.zip" --keychain-profile "notarytool-profile" --wait
          xcrun stapler staple "$ARTIFACT_PATH"
          
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Arrivals" \
            --window-size 640 480 \
            --icon "Arrivals.app" 160 240 \
            --app-drop-link 480 240 \
            "Arrivals.dmg" \
            "macOS/target/Arrivals.app" \
            || test $? -eq 2

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" Arrivals.dmg --title "macOS ${{ github.ref_name }}" --generate-notes --latest
