name: Push

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  shared:
    name: Shared
    runs-on: ubuntu-24.04
    steps:

    - uses: actions/checkout@v5

    - name: Configure JDK
      uses: actions/setup-java@v5
      with:
       distribution: 'temurin'
       java-version: '17'

    - name: Load secrets
      run: |
          echo "tfl_key=${{ secrets.TFL_KEY }}" > shared/secret.properties
          echo "darwin_key=${{ secrets.DARWIN_KEY }}" >> shared/secret.properties
          echo "org_511_key=${{ secrets.ORG_511_KEY }}" >> shared/secret.properties

    - name: Check
      run: ./gradlew spotlessCheck

    - name: Build
      # Skip native CLI linking on Linux due to Clikt cache bug: https://github.com/ajalt/clikt/issues/598
      run: ./gradlew assemble -x linkDebugExecutableLinuxX64 -x linkDebugExecutableLinuxArm64 -x linkReleaseExecutableLinuxX64 -x linkReleaseExecutableLinuxArm64

    - name: Test
      run: ./gradlew allTests

    - name: Smoke test CLI
      run: ./gradlew :cli:jvmRun --args="--help"

    - name: Publish test results
      uses: dorny/test-reporter@v2.1.1
      if: always()
      with:
        name: Test results
        path: '**/build/test-results/**/TEST-*.xml'
        reporter: java-junit
        fail-on-error: true

  macOS:
    name: macOS app
    runs-on: macos-26
    steps:

    - uses: actions/checkout@v5

    - name: Configure Xcode
      uses: maxim-lobanov/setup-xcode@v1.6.0
      with:
        xcode-version: '26.1'

    - name: Configure JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Load secrets
      run: |
          echo "tfl_key=${{ secrets.TFL_KEY }}" > shared/secret.properties
          echo "darwin_key=${{ secrets.DARWIN_KEY }}" >> shared/secret.properties
          echo "org_511_key=${{ secrets.ORG_511_KEY }}" >> shared/secret.properties

    - name: Build
      run: |
        xcodebuild -project macOS/Arrivals.xcodeproj \
          -scheme Arrivals \
          -configuration Debug build

    - name: Test
      run: |
        xcodebuild test \
          -project macOS/Arrivals.xcodeproj \
          -scheme Arrivals \
          -destination 'platform=macOS' \
          -skip-testing:ArrivalsUITests

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
